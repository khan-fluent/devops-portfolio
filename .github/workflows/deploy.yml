name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-portfolio
  ECS_CLUSTER: devops-portfolio
  ECS_SERVICE: devops-portfolio

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition devops-portfolio \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: devops-portfolio
          image: ${{ steps.build-image.outputs.image }}

      - name: Record deploy start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Get app public IP
        id: ip
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=devops-portfolio-ecs-instance" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Record deployment to API
        if: always()
        run: |
          END=$(date +%s%3N)
          DURATION=$(( END - ${{ steps.timer.outputs.start }} ))
          STATUS=${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
          curl -s -X POST "http://${{ steps.ip.outputs.ip }}:3000/api/deployments" \
            -H "Content-Type: application/json" \
            -d "{\"commit_sha\": \"${{ github.sha }}\", \"branch\": \"${{ github.ref_name }}\", \"status\": \"$STATUS\", \"duration_ms\": $DURATION}" \
            || echo "Failed to record deployment (app may still be starting)"
