version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://portfolio:localdev123@db:5432/portfolio
      NODE_ENV: production
      PORT: 80
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Dev-only: run frontend and backend separately with hot reload
  server-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && node db/init.js && npm run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://portfolio:localdev123@db:5432/portfolio
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./app/server:/app
      - server_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev

  client-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./app/client:/app
      - client_modules:/app/node_modules
    profiles:
      - dev

volumes:
  pgdata:
  server_modules:
  client_modules:
